<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NCLEX Practice</title>
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f3ec">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1d1b17">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      --paper:      light-dark(oklch(96.8% 0.011 84), oklch(22.5% 0.012 70));
      --raise:      light-dark(oklch(98.6% 0.008 88), oklch(25.5% 0.013 70));
      --ink:        light-dark(oklch(28% 0.02 60),    oklch(90% 0.013 84));
      --ink-soft:   light-dark(oklch(44% 0.02 60),    oklch(74% 0.014 80));
      --ink-faint:  light-dark(oklch(56% 0.016 65),   oklch(60% 0.012 75));
      --line:       light-dark(oklch(86% 0.014 84),   oklch(34% 0.012 70));
      --line-soft:  light-dark(oklch(90.5% 0.011 84), oklch(29.5% 0.012 70));
      --accent:     light-dark(oklch(43% 0.075 195),  oklch(76% 0.07 190));
      --on-accent:  light-dark(oklch(97% 0.01 190),   oklch(21% 0.03 195));
      --good:       light-dark(oklch(48% 0.105 152),  oklch(76% 0.11 152));
      --good-bg:    light-dark(oklch(94.5% 0.035 152),oklch(29.5% 0.04 152));
      --bad:        light-dark(oklch(49% 0.14 32),    oklch(74% 0.115 32));
      --bad-bg:     light-dark(oklch(95% 0.024 32),   oklch(28.5% 0.04 32));
      --serif: "Newsreader", Georgia, "Times New Roman", serif;
      --sans: "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      cursor: pointer;
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .caps {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    main {
      width: min(42rem, 100%);
      margin-inline: auto;
      padding: clamp(1.25rem, 4vw, 2.5rem) clamp(1.1rem, 4vw, 1.5rem) 3.5rem;
      flex: 1;
    }

    /* ---------- top bar ---------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--paper);
    }

    .topbar-inner {
      width: min(42rem, 100%);
      margin-inline: auto;
      padding: 0.7rem clamp(1.1rem, 4vw, 1.5rem);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .end-btn {
      color: var(--ink-faint);
      padding: 0.15rem 0;
      transition: color 0.15s;
    }
    .end-btn:hover { color: var(--bad); }

    .tb-topic {
      color: var(--ink-soft);
      flex: 1;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tb-count {
      color: var(--ink-faint);
      font-size: 0.8rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .track { height: 2px; background: var(--line-soft); }
    .track-fill {
      height: 100%;
      background: var(--accent);
      width: 0;
      transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ---------- start screen ---------- */
    .masthead { padding-top: clamp(1.5rem, 7vw, 4rem); margin-bottom: clamp(2rem, 6vw, 3rem); }
    .masthead .caps { color: var(--accent); display: block; margin-bottom: 0.9rem; }
    .masthead h1 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(2.1rem, 4.5vw + 1rem, 2.9rem);
      line-height: 1.08;
      letter-spacing: -0.015em;
    }
    .masthead h1 em { font-style: italic; font-weight: 400; }
    .masthead .sub { color: var(--ink-faint); margin-top: 0.7rem; font-size: 0.95rem; }

    .list-label { color: var(--ink-faint); margin: 2.25rem 0 0.25rem; display: block; }

    .course-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin: 2.5rem 0 0.5rem;
    }
    .course-head .caps { color: var(--accent); }
    .course-total {
      color: var(--ink-faint);
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .topic-row--all {
      border-bottom-color: var(--line);
      margin-top: 0.5rem;
    }
    .topic-row--all .topic-name { font-style: italic; }

    .topic-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      width: 100%;
      text-align: left;
      padding: 1.05rem 0.15rem;
      border-bottom: 1px solid var(--line-soft);
    }

    .topic-name {
      font-family: var(--serif);
      font-size: 1.2rem;
      transition: color 0.15s;
    }

    .topic-meta {
      color: var(--ink-faint);
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }
    .topic-meta .arrow { transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1); display: inline-block; }
    .topic-row:hover .topic-name { color: var(--accent); }
    .topic-row:hover .arrow { transform: translateX(4px); }

    .hint {
      margin-top: 2.5rem;
      color: var(--ink-faint);
      font-size: 0.8rem;
    }
    .hint kbd {
      font-family: var(--sans);
      font-size: 0.72rem;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      margin: 0 0.1rem;
    }
    @media (hover: none) { .hint { display: none; } }

    /* ---------- question ---------- */
    .q-tag { color: var(--accent); display: block; margin-bottom: 1rem; }

    .stem {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(1.2rem, 0.5vw + 1.1rem, 1.4rem);
      line-height: 1.45;
      margin-bottom: 1.75rem;
      text-wrap: pretty;
    }

    .options { display: grid; gap: 0.65rem; }

    .option {
      display: flex;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.55rem 0.85rem;
      width: 100%;
      text-align: left;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-family: var(--serif);
      font-size: 1.05rem;
      line-height: 1.45;
      transition: border-color 0.15s, background-color 0.15s, opacity 0.3s;
    }

    .option:not(:disabled):hover { border-color: var(--ink-faint); background: var(--raise); }
    .option:not(:disabled):active { background: var(--line-soft); }
    .option:disabled { cursor: default; color: var(--ink); }

    .key {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-faint);
      border: 1px solid var(--line);
      border-radius: 6px;
      width: 1.55rem;
      height: 1.55rem;
      display: grid;
      place-items: center;
      flex: none;
      margin-top: 0.05rem;
      transition: inherit;
    }

    .opt-text { flex: 1; min-width: 12rem; }

    .option.is-correct { background: var(--good-bg); border-color: var(--good); }
    .option.is-correct .key { border-color: var(--good); color: var(--good); }
    .option.is-wrong { background: var(--bad-bg); border-color: var(--bad); }
    .option.is-wrong .key { border-color: var(--bad); color: var(--bad); }
    .option.is-dim { opacity: 0.45; }

    .verdict {
      margin-left: auto;
      align-self: flex-start;
      padding-top: 0.3rem;
      white-space: nowrap;
    }
    .verdict.good { color: var(--good); }
    .verdict.bad { color: var(--bad); }

    .option.is-selected { border-color: var(--accent); background: var(--raise); }
    .option.is-selected .key { border-color: var(--accent); color: var(--accent); }

    .sata-hint { color: var(--accent); display: block; margin: -0.4rem 0 1rem; }

    .submit-btn { margin-top: 1rem; }
    .r-key.bad { color: var(--ink-faint); }

    /* ---------- rationale ---------- */
    .rationale {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .rationale.open { grid-template-rows: 1fr; }
    .rationale.instant { transition: none; }
    .rationale-clip { overflow: hidden; min-height: 0; }
    .rationale-body {
      margin-top: 1.9rem;
      border-top: 1px solid var(--line);
      padding-top: 1.4rem;
    }
    .rationale-body h3 { color: var(--ink-faint); margin-bottom: 0.9rem; }
    .rationale-body p {
      font-family: var(--serif);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      color: var(--ink-soft);
      text-wrap: pretty;
    }
    .rationale-body p.lead { color: var(--ink); }
    .r-key {
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-right: 0.4rem;
      color: var(--ink-faint);
    }
    .r-key.good { color: var(--good); }

    /* ---------- entrance motion ---------- */
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    .enter .stem, .enter .q-tag { animation: rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .enter .option {
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      animation-delay: calc(60ms + var(--i) * 45ms);
    }

    /* ---------- bottom bar ---------- */
    .bottombar {
      position: sticky;
      bottom: 0;
      z-index: 10;
      background: var(--paper);
      border-top: 1px solid var(--line-soft);
    }
    .bottombar-inner {
      width: min(42rem, 100%);
      margin-inline: auto;
      padding: 0.7rem clamp(1.1rem, 4vw, 1.5rem);
      padding-bottom: calc(0.7rem + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .btn {
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.75rem 1.5rem;
      min-height: 48px;
      border-radius: 10px;
      transition: background-color 0.15s, color 0.15s, opacity 0.15s;
    }
    .btn.solid { background: var(--accent); color: var(--on-accent); }
    .btn.solid:not(:disabled):hover { background: color-mix(in oklch, var(--accent), var(--ink) 12%); }
    .btn.ghost { color: var(--ink-soft); padding-inline: 1rem; }
    .btn.ghost:not(:disabled):hover { background: var(--raise); }
    .btn:disabled { opacity: 0.35; cursor: default; }

    .link-btn {
      color: var(--ink-faint);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem;
      transition: color 0.15s;
    }
    .link-btn:hover { color: var(--accent); }

    /* ---------- results ---------- */
    .results-head { padding: clamp(1.5rem, 6vw, 3rem) 0 2rem; }
    .results-head .caps { color: var(--ink-faint); display: block; margin-bottom: 1.1rem; }

    .score {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(3.2rem, 8vw + 1rem, 4.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .score .den { color: var(--ink-faint); font-weight: 400; }

    .verdict-line {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1.25rem;
      color: var(--ink-soft);
      margin-top: 0.9rem;
    }

    .results-list { border-top: 1px solid var(--line); margin-top: 0.5rem; }

    .result-row {
      display: flex;
      align-items: baseline;
      gap: 0.9rem;
      width: 100%;
      text-align: left;
      padding: 0.95rem 0.15rem;
      border-bottom: 1px solid var(--line-soft);
      transition: background-color 0.15s;
    }
    .result-row:hover { background: var(--raise); }

    .mark {
      flex: none;
      width: 1.3rem;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
    }
    .mark.good { color: var(--good); }
    .mark.bad { color: var(--bad); }
    .mark.skip { color: var(--ink-faint); }

    .result-stem {
      font-family: var(--serif);
      font-size: 0.98rem;
      color: var(--ink-soft);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .result-row:hover .result-stem { color: var(--ink); }

    .results-actions {
      margin-top: 2.25rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <header class="topbar" id="topbar" hidden>
    <div class="topbar-inner">
      <button class="end-btn caps" onclick="endSession()">End</button>
      <span class="tb-topic caps" id="tb-topic"></span>
      <span class="tb-count" id="tb-count"></span>
    </div>
    <div class="track"><div class="track-fill" id="tb-fill"></div></div>
  </header>

  <main id="main"></main>

  <nav class="bottombar" id="bottombar" hidden>
    <div class="bottombar-inner">
      <button class="btn ghost" id="prev-btn" onclick="prevQuestion()">Previous</button>
      <button class="link-btn" id="results-link" onclick="showResults()" hidden>All results</button>
      <button class="btn solid" id="next-btn" onclick="nextQuestion()">Next</button>
    </div>
  </nav>

<script src="questions/banks.js"></script>
<script>
const DATA = window.NCLEX_DATA || { labels: {}, banks: {} };
const TOPIC_LABELS = DATA.labels;
const QUESTIONS = DATA.banks;

// Course groupings for the start screen. Membership follows the bank-key
// convention: med-surg-* banks are Med-Surg, everything else is Pathopharm.
// `strip` removes the redundant course prefix from a bank's display name,
// since the section header already names the course.
const COURSE_GROUPS = [
  { label: "Pathopharmacology", match: k => !k.startsWith("med-surg-") },
  { label: "Med-Surg", match: k => k.startsWith("med-surg-"), strip: /^Med-Surg:\s*/ },
];

const state = {
  view: "start",       // start | quiz | results
  topic: null,         // topic key, or "all"
  shuffled: false,
  questions: [],
  index: 0,
  answers: {},         // index -> original option index (MC) or sorted array (SATA)
  pending: new Set(),  // in-progress SATA selection (original option indices)
  pendingIndex: -1,
  review: false        // revisiting a question from the results screen
};

const $ = id => document.getElementById(id);
const letter = i => String.fromCharCode(65 + i);
const range = n => Array.from({ length: n }, (_, i) => i);
const isSata = q => Array.isArray(q.answer);

function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function allQuestions() {
  return Object.entries(QUESTIONS).flatMap(([topic, qs]) => qs.map(q => ({ ...q, topic })));
}

// Correct-answer set (original option indices) for either question type.
function answerSet(q) {
  return new Set(isSata(q) ? q.answer : [q.answer]);
}

function isCorrect(q, ans) {
  if (ans === undefined) return false;
  const key = answerSet(q);
  if (isSata(q)) {
    if (!Array.isArray(ans) || ans.length !== key.size) return false;
    return ans.every(i => key.has(i));
  }
  return ans === q.answer;
}

function sessionLabel() {
  if (state.topic === "all") return "All Topics";
  return TOPIC_LABELS[state.topic];
}

function startSession(topic, shuffled = false) {
  state.topic = topic;
  state.shuffled = shuffled;
  let list = topic === "all"
    ? allQuestions()
    : QUESTIONS[topic].map(q => ({ ...q, topic }));
  if (shuffled) list = shuffle(list);
  // Randomize option order per question so the correct answer is not
  // clustered in one position across the bank.
  state.questions = list.map(q => ({ ...q, _order: shuffle(range(q.options.length)) }));
  state.index = 0;
  state.answers = {};
  state.pending = new Set();
  state.pendingIndex = -1;
  state.review = false;
  state.view = "quiz";
  render();
  window.scrollTo(0, 0);
}

function endSession() {
  state.view = "start";
  state.answers = {};
  state.review = false;
  render();
  window.scrollTo(0, 0);
}

function render() {
  const inQuiz = state.view === "quiz";
  $("topbar").hidden = !inQuiz;
  $("bottombar").hidden = !inQuiz;
  if (state.view === "start") renderStart();
  else if (state.view === "results") renderResults();
  else renderQuiz({ enter: true });
}

/* ---------- start ---------- */

function renderStart() {
  const total = allQuestions().length;

  const groupsHtml = COURSE_GROUPS.map(group => {
    const entries = Object.entries(QUESTIONS).filter(([key]) => group.match(key));
    if (!entries.length) return "";
    const courseTotal = entries.reduce((n, [, qs]) => n + qs.length, 0);
    const rows = entries.map(([key, qs]) => {
      const name = group.strip
        ? TOPIC_LABELS[key].replace(group.strip, "")
        : TOPIC_LABELS[key];
      return `
      <button class="topic-row" onclick="startSession('${key}')">
        <span class="topic-name">${name}</span>
        <span class="topic-meta">${qs.length} questions <span class="arrow">&rarr;</span></span>
      </button>`;
    }).join("");
    return `
    <div class="course-head">
      <span class="caps">${group.label}</span>
      <span class="course-total">${courseTotal} questions</span>
    </div>
    ${rows}`;
  }).join("");

  const courseCount = COURSE_GROUPS.filter(g =>
    Object.keys(QUESTIONS).some(k => g.match(k))).length;

  $("main").innerHTML = `
    <div class="masthead">
      <span class="caps">Question Bank</span>
      <h1>NCLEX <em>Practice</em></h1>
      <p class="sub">${total} questions with full rationales, across ${Object.keys(QUESTIONS).length} topics in ${courseCount} courses.</p>
    </div>

    <button class="topic-row topic-row--all" onclick="startSession('all', true)">
      <span class="topic-name">All questions</span>
      <span class="topic-meta">${total} · shuffled <span class="arrow">&rarr;</span></span>
    </button>

    ${groupsHtml}

    <p class="hint">Tip: answer with <kbd>A</kbd>&ndash;<kbd>E</kbd>, move with <kbd>&larr;</kbd> <kbd>&rarr;</kbd>.</p>
  `;
}

/* ---------- quiz ---------- */

function renderQuiz(opts = {}) {
  const q = state.questions[state.index];
  const sata = isSata(q);
  const stored = state.answers[state.index];
  const answered = stored !== undefined;
  const showTag = state.topic === "all";
  const key = answerSet(q);

  if (state.pendingIndex !== state.index) {
    state.pending = new Set();
    state.pendingIndex = state.index;
  }
  const picked = answered
    ? new Set(sata ? stored : [stored])
    : state.pending;

  $("tb-topic").textContent = state.review ? "Review · " + sessionLabel() : sessionLabel();
  $("tb-count").textContent = `${state.index + 1} / ${state.questions.length}`;
  $("tb-fill").style.width = `${((state.index + 1) / state.questions.length) * 100}%`;

  const optionsHtml = q._order.map((orig, slot) => {
    let cls = "option";
    let verdict = "";
    if (answered) {
      const isKey = key.has(orig);
      const wasPicked = picked.has(orig);
      if (isKey) {
        cls += " is-correct";
        verdict = `<span class="verdict caps good">${wasPicked ? "Correct" : "Answer"}</span>`;
      } else if (wasPicked) {
        cls += " is-wrong";
        verdict = `<span class="verdict caps bad">Your answer</span>`;
      } else {
        cls += " is-dim";
      }
    } else if (picked.has(orig)) {
      cls += " is-selected";
    }
    const handler = sata ? `toggleOption(${slot})` : `selectAnswer(${slot})`;
    return `<button class="${cls}" style="--i:${slot}" onclick="${handler}" ${answered ? "disabled" : ""}>
      <span class="key">${letter(slot)}</span>
      <span class="opt-text">${q.options[orig]}</span>${verdict}
    </button>`;
  }).join("");

  const submitHtml = sata && !answered
    ? `<button class="btn solid submit-btn" onclick="submitSata()" ${picked.size ? "" : "disabled"}>Submit selection</button>`
    : "";
  const sataHint = sata && !answered
    ? `<p class="sata-hint caps">Select all that apply</p>`
    : "";

  const rationaleHtml = q._order.map((orig, slot) => {
    const good = key.has(orig);
    return `<p><span class="r-key ${good ? "good" : "bad"}">${letter(slot)}</span>${q.explanations[orig]}</p>`;
  }).join("");

  $("main").innerHTML = `
    <article class="${opts.enter ? "enter" : ""}">
      ${showTag ? `<span class="q-tag caps">${TOPIC_LABELS[q.topic]}</span>` : ""}
      <h2 class="stem">${q.stem}</h2>
      ${sataHint}
      <div class="options">${optionsHtml}</div>
      ${submitHtml}
      <section class="rationale ${answered && !opts.reveal ? "open instant" : ""}" id="rationale">
        <div class="rationale-clip">
          <div class="rationale-body">
            <h3 class="caps">Rationale</h3>
            ${rationaleHtml}
          </div>
        </div>
      </section>
    </article>
  `;

  if (opts.reveal) {
    const el = $("rationale");
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.classList.add("open");
      el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }));
  }

  updateNav(answered);
}

function updateNav(answered) {
  const last = state.index === state.questions.length - 1;
  $("prev-btn").disabled = state.index === 0;
  $("results-link").hidden = !state.review;
  $("next-btn").textContent = last ? (state.review ? "Results" : "Finish") : "Next";
}

// MC: pick and reveal immediately. slot is the displayed position.
function selectAnswer(slot) {
  if (state.answers[state.index] !== undefined) return;
  const q = state.questions[state.index];
  state.answers[state.index] = q._order[slot];
  renderQuiz({ reveal: true });
}

// SATA: toggle a choice without revealing.
function toggleOption(slot) {
  if (state.answers[state.index] !== undefined) return;
  const q = state.questions[state.index];
  const orig = q._order[slot];
  if (state.pendingIndex !== state.index) {
    state.pending = new Set();
    state.pendingIndex = state.index;
  }
  if (state.pending.has(orig)) state.pending.delete(orig);
  else state.pending.add(orig);
  renderQuiz({});
}

function submitSata() {
  if (state.answers[state.index] !== undefined) return;
  if (!state.pending.size) return;
  state.answers[state.index] = [...state.pending].sort((a, b) => a - b);
  renderQuiz({ reveal: true });
}

function nextQuestion() {
  if (state.index < state.questions.length - 1) {
    state.index++;
    renderQuiz({ enter: true });
    window.scrollTo(0, 0);
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (state.index === 0) return;
  state.index--;
  renderQuiz({ enter: true });
  window.scrollTo(0, 0);
}

/* ---------- results ---------- */

function showResults() {
  state.view = "results";
  render();
  window.scrollTo(0, 0);
}

function reviewQuestion(i) {
  state.review = true;
  state.index = i;
  state.view = "quiz";
  render();
  window.scrollTo(0, 0);
}

function verdictLine(pct, skipped) {
  if (skipped === state.questions.length) return "Nothing answered yet — give it a real pass.";
  if (pct === 100) return "A perfect set. Well done.";
  if (pct >= 80) return "Strong work — review the misses below.";
  if (pct >= 60) return "Solid. The rationales below are where the points are.";
  return "Keep drilling — read every rationale before the next pass.";
}

function renderResults() {
  const qs = state.questions;
  const correct = qs.reduce((n, q, i) => n + (isCorrect(q, state.answers[i]) ? 1 : 0), 0);
  const skipped = qs.reduce((n, _, i) => n + (state.answers[i] === undefined ? 1 : 0), 0);
  const pct = Math.round((correct / qs.length) * 100);

  const rows = qs.map((q, i) => {
    const a = state.answers[i];
    const good = isCorrect(q, a);
    const mark = a === undefined ? "–" : good ? "✓" : "✕";
    const cls = a === undefined ? "skip" : good ? "good" : "bad";
    return `<button class="result-row" onclick="reviewQuestion(${i})">
      <span class="mark ${cls}">${mark}</span>
      <span class="result-stem">${q.stem}</span>
    </button>`;
  }).join("");

  $("main").innerHTML = `
    <div class="results-head">
      <span class="caps">${sessionLabel()} · ${pct}%</span>
      <div class="score">${correct}<span class="den"> / ${qs.length}</span></div>
      <p class="verdict-line">${verdictLine(pct, skipped)}</p>
    </div>

    <div class="results-list">${rows}</div>

    <div class="results-actions">
      <button class="btn solid" onclick="startSession(state.topic, state.shuffled)">Try this set again</button>
      <button class="btn ghost" onclick="endSession()">Choose another set</button>
    </div>
  `;
}

/* ---------- keyboard ---------- */

document.addEventListener("keydown", e => {
  if (state.view !== "quiz" || e.metaKey || e.ctrlKey || e.altKey) return;
  const q = state.questions[state.index];
  const answered = state.answers[state.index] !== undefined;
  const k = e.key.toLowerCase();

  if (!answered) {
    let idx = "abcde".indexOf(k);
    if (idx === -1) idx = "12345".indexOf(k);
    if (idx > -1 && idx < q.options.length) {
      e.preventDefault();
      if (isSata(q)) toggleOption(idx);
      else selectAnswer(idx);
      return;
    }
    if (isSata(q) && k === "enter") {
      e.preventDefault();
      submitSata();
      return;
    }
  }
  if (k === "arrowright" || (k === "enter" && answered && e.target.tagName !== "BUTTON")) {
    e.preventDefault();
    nextQuestion();
  } else if (k === "arrowleft") {
    e.preventDefault();
    prevQuestion();
  }
});

if (!Object.keys(QUESTIONS).length) {
  $("main").innerHTML = `<div class="masthead"><h1>No questions loaded</h1>
    <p class="sub">Run <code>python3 build.py</code> to generate questions/banks.js, then reload.</p></div>`;
} else {
  render();
}
</script>
</body>
</html>
